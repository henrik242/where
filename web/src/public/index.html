<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Where - Live Tracking</title>

    <!-- Favicon and Icons -->
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
    <link rel="apple-touch-icon" href="icon-192.png">

    <meta name="description" content="Free, open-source outdoor navigation with offline maps, GPS tracking, and live location sharing for iOS and Android.">

    <!-- Open Graph -->
    <meta property="og:title" content="Where - Outdoor Navigation & Live Tracking">
    <meta property="og:description" content="Free, open-source outdoor navigation with offline maps, GPS tracking, and live location sharing for iOS and Android.">
    <meta property="og:image" content="https://where.synth.no/og-image.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:url" content="https://where.synth.no/about">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Where">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Where - Outdoor Navigation & Live Tracking">
    <meta name="twitter:description" content="Free, open-source outdoor navigation with offline maps, GPS tracking, and live location sharing for iOS and Android.">
    <meta name="twitter:image" content="https://where.synth.no/og-image.png">

    <meta name="theme-color" content="#1a73e8">

    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css">
    <link rel="stylesheet" href="app.css">
</head>
<body>
    <div id="map"></div>
    <!-- VERSION_PLACEHOLDER -->
    <div class="menu-wrapper">
        <button class="menu-btn" onclick="this.parentElement.classList.toggle('open')" title="Menu">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
                <circle cx="10" cy="4" r="1.5"/><circle cx="10" cy="10" r="1.5"/><circle cx="10" cy="16" r="1.5"/>
            </svg>
        </button>
        <div class="menu-dropdown">
            <a href="/about">About Where</a>
            <a href="https://github.com/henrik242/where">GitHub</a>
            <div class="menu-version" id="version-display"></div>
        </div>
    </div>
    <button id="show-panel-btn" class="show-panel-btn" onclick="showPanel()">
        📍 Live Tracks
    </button>
    <div class="info-panel" id="info-panel">
        <div class="panel-header">
            <h2>Live Tracks</h2>
            <button class="close-btn" onclick="hidePanel()" title="Close">×</button>
        </div>
        <div class="admin-section" id="admin-section">
            <div style="font-weight: 600; margin-bottom: 4px;">👑 Admin Active</div>
            <div style="font-size: 11px; opacity: 0.9; margin-bottom: 8px;">Viewing all tracks</div>
            <div id="session-stats" style="font-size: 11px; opacity: 0.9; margin-bottom: 8px;"></div>
            <button class="admin-button" onclick="disableAdmin()">Disable Admin</button>
        </div>
        <div class="client-filter">
            <h3>Filter by Client ID</h3>
            <div class="client-tags" id="client-tags"></div>
            <div class="add-client-form">
                <input type="text" id="client-input" placeholder="Enter client ID (e.g., abc123)" maxlength="6">
                <button onclick="addClientFilter()">Add</button>
            </div>
            <div style="margin-top: 8px;">
                <label for="historical-toggle" style="font-size: 12px; display: flex; align-items: center; gap: 6px; cursor: pointer;">
                    <input type="checkbox" id="historical-toggle" onchange="toggleHistorical()" style="cursor: pointer;">
                    Show historical (24h)
                </label>
            </div>
        </div>
        <div id="tracks-list">
            <div class="loading">
                <div class="spinner"></div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <script>document.addEventListener('click', e => { if (!e.target.closest('.menu-wrapper')) document.querySelector('.menu-wrapper')?.classList.remove('open'); });</script>
    <script src="app.js"></script>
</body>
</html>
