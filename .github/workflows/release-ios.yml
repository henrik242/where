name: Release iOS

permissions:
  contents: write

on:
  workflow_dispatch:

concurrency:
  group: release-ios
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-26
    environment: production

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v5

    - name: Cache Konan
      uses: actions/cache@v5
      with:
        path: |
          /Users/runner/.konan/kotlin-native-prebuilt-*
          /Users/runner/.konan/dependencies
        key: ${{ runner.os }}-konan-${{ hashFiles('gradle/libs.versions.toml') }}
        restore-keys: |
          ${{ runner.os }}-konan-

    - name: Create local.properties
      env:
        TRACKING_HINT: ${{ secrets.TRACKING_HINT }}
      run: |
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        echo "TRACKING_HINT=$TRACKING_HINT" >> local.properties

    - name: Create GoogleService-Info.plist
      env:
        GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
        GOOGLE_SERVICE_INFO_DEBUG_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_DEBUG_PLIST }}
      run: |
        echo "$GOOGLE_SERVICE_INFO_PLIST" | base64 -d > iosApp/Where/GoogleService-Info.plist
        echo "$GOOGLE_SERVICE_INFO_DEBUG_PLIST" | base64 -d > iosApp/Where/GoogleService-debug-Info.plist

    - name: Create google-services.json
      env:
        GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
      run: echo "$GOOGLE_SERVICES_JSON" | base64 -d > app/google-services.json

    - name: Compute version
      id: version
      run: |
        COMMIT_COUNT=$(git rev-list --count HEAD)
        SHORT_SHA=$(git rev-parse --short HEAD)
        BUILD_DATE=$(date +%Y-%m-%d)
        echo "commit_count=$COMMIT_COUNT" >> "$GITHUB_OUTPUT"
        echo "tag=v$COMMIT_COUNT" >> "$GITHUB_OUTPUT"
        echo "Version: $COMMIT_COUNT ($SHORT_SHA, $BUILD_DATE)"

    - name: Update iOS version
      run: |
        cat > iosApp/Where/Generated.xcconfig << EOF
        CURRENT_PROJECT_VERSION = ${{ steps.version.outputs.commit_count }}
        MARKETING_VERSION = 1.0.${{ steps.version.outputs.commit_count }}
        EOF

    - name: Run tests
      run: ./gradlew testDebugUnitTest

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: test-results
        path: app/build/reports/tests/
        retention-days: 14

    - name: Compile iOS test sources
      run: ./gradlew :shared:compileTestKotlinIosSimulatorArm64

    - name: Build shared framework
      run: ./gradlew :shared:linkReleaseFrameworkIosArm64

    - name: Install Apple certificate and provisioning profile
      env:
        DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.DISTRIBUTION_CERTIFICATE_BASE64 }}
        DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.DISTRIBUTION_CERTIFICATE_PASSWORD }}
        PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
      run: |
        CERTIFICATE_PATH=$RUNNER_TEMP/distribution.p12
        PROFILE_PATH=$RUNNER_TEMP/distribution.mobileprovision
        KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
        KEYCHAIN_PASSWORD=$(openssl rand -hex 16)

        echo "$DISTRIBUTION_CERTIFICATE_BASE64" | base64 -d > "$CERTIFICATE_PATH"
        echo "$PROVISIONING_PROFILE_BASE64" | base64 -d > "$PROFILE_PATH"

        security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        security import "$CERTIFICATE_PATH" -P "$DISTRIBUTION_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
        security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
        PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(/usr/bin/security cms -D -i "$PROFILE_PATH"))
        PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" /dev/stdin <<< $(/usr/bin/security cms -D -i "$PROFILE_PATH"))
        cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$PROFILE_UUID".mobileprovision
        echo "PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"
        echo "PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"

    - name: Configure signing for CI
      run: |
        sed -i '' 's/CODE_SIGN_STYLE = Automatic/CODE_SIGN_STYLE = Manual/g' iosApp/Where.xcodeproj/project.pbxproj
        sed -i '' 's/CODE_SIGN_IDENTITY = "Apple Development"/CODE_SIGN_IDENTITY = "iPhone Distribution"/g' iosApp/Where.xcodeproj/project.pbxproj
        sed -i '' "s/PROVISIONING_PROFILE_SPECIFIER = \"\"/PROVISIONING_PROFILE_SPECIFIER = \"$PROFILE_NAME\"/g" iosApp/Where.xcodeproj/project.pbxproj

    - name: Verify signing setup
      run: |
        echo "Keychains in search list:"
        security list-keychains -d user
        echo ""
        echo "Signing identities:"
        security find-identity -v -p codesigning $RUNNER_TEMP/app-signing.keychain-db
        echo ""
        echo "Provisioning profiles:"
        ls ~/Library/MobileDevice/Provisioning\ Profiles/

    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.4'
        bundler-cache: true
        working-directory: fastlane

    - name: Build and sign IPA
      env:
        OUTPUT_DIR: ${{ runner.temp }}/export
        PROFILE_NAME: ${{ env.PROFILE_NAME }}
        GYM_KEYCHAIN_PATH: ${{ runner.temp }}/app-signing.keychain-db
        FASTLANE_XCODEBUILD_SETTINGS_TIMEOUT: 60
      run: bundle exec --gemfile=fastlane/Gemfile fastlane ios build

    - name: Upload IPA
      uses: actions/upload-artifact@v7
      with:
        name: release-ipa
        path: ${{ runner.temp }}/export/Where.ipa
        retention-days: 90

    - name: Upload to App Store Connect
      env:
        ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
        IPA_PATH: ${{ runner.temp }}/export/Where.ipa
      run: bundle exec --gemfile=fastlane/Gemfile fastlane ios deploy

    - name: Create version tag and release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        VERSION_TAG="${{ steps.version.outputs.tag }}"
        echo "Tagging $VERSION_TAG"
        git tag "$VERSION_TAG" 2>/dev/null || true
        git push origin "$VERSION_TAG" 2>/dev/null || true
        if gh release view "$VERSION_TAG" &>/dev/null; then
          gh release upload "$VERSION_TAG" "${{ runner.temp }}/export/Where.ipa" --clobber
        else
          gh release create "$VERSION_TAG" \
            --title "$VERSION_TAG" \
            --notes "Release $VERSION_TAG" \
            "${{ runner.temp }}/export/Where.ipa"
        fi

    - name: Cleanup secrets
      if: always()
      run: |
        security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
        rm -f $RUNNER_TEMP/distribution.p12 $RUNNER_TEMP/distribution.mobileprovision
        rm -f local.properties
