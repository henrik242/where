name: Release iOS

permissions:
  contents: write

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: macos-latest
    environment: production

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v5

    - name: Cache Konan
      uses: actions/cache@v5
      with:
        path: |
          /Users/runner/.konan/kotlin-native-prebuilt-*
          /Users/runner/.konan/dependencies
        key: ${{ runner.os }}-konan-${{ hashFiles('gradle/libs.versions.toml') }}
        restore-keys: |
          ${{ runner.os }}-konan-

    - name: Create local.properties
      run: |
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        echo "TRACKING_HINT=${{ secrets.TRACKING_HINT }}" >> local.properties

    - name: Create GoogleService-Info.plist
      run: |
        echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}" | base64 -d > iosApp/Where/GoogleService-Info.plist
        echo "${{ secrets.GOOGLE_SERVICE_INFO_DEBUG_PLIST }}" | base64 -d > iosApp/Where/GoogleService-debug-Info.plist

    - name: Compute version
      id: version
      run: |
        COMMIT_COUNT=$(git rev-list --count HEAD)
        SHORT_SHA=$(git rev-parse --short HEAD)
        BUILD_DATE=$(date +%Y-%m-%d)
        echo "commit_count=$COMMIT_COUNT" >> "$GITHUB_OUTPUT"
        echo "tag=v$COMMIT_COUNT" >> "$GITHUB_OUTPUT"
        echo "Version: $COMMIT_COUNT ($SHORT_SHA, $BUILD_DATE)"

    - name: Update iOS version
      run: |
        cat > iosApp/Where/Generated.xcconfig << EOF
        CURRENT_PROJECT_VERSION = ${{ steps.version.outputs.commit_count }}
        MARKETING_VERSION = 1.0.${{ steps.version.outputs.commit_count }}
        EOF

    - name: Build shared framework
      run: ./gradlew :shared:linkReleaseFrameworkIosArm64 --stacktrace

    - name: Install Apple certificate and provisioning profile
      env:
        DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.DISTRIBUTION_CERTIFICATE_BASE64 }}
        DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.DISTRIBUTION_CERTIFICATE_PASSWORD }}
        PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
      run: |
        CERTIFICATE_PATH=$RUNNER_TEMP/distribution.p12
        PROFILE_PATH=$RUNNER_TEMP/distribution.mobileprovision
        KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

        echo "$DISTRIBUTION_CERTIFICATE_BASE64" | base64 -d > "$CERTIFICATE_PATH"
        echo "$PROVISIONING_PROFILE_BASE64" | base64 -d > "$PROFILE_PATH"

        security create-keychain -p "" "$KEYCHAIN_PATH"
        security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
        security unlock-keychain -p "" "$KEYCHAIN_PATH"
        security import "$CERTIFICATE_PATH" -P "$DISTRIBUTION_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
        security set-key-partition-list -S apple-tool:,apple: -k "" "$KEYCHAIN_PATH"
        security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
        PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(/usr/bin/security cms -D -i "$PROFILE_PATH"))
        cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$PROFILE_UUID".mobileprovision
        echo "PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"

    - name: Archive app
      run: |
        xcodebuild archive \
          -project iosApp/Where.xcodeproj \
          -scheme Where \
          -destination "generic/platform=iOS" \
          -archivePath $RUNNER_TEMP/Where.xcarchive \
          CODE_SIGN_STYLE=Manual \
          PROVISIONING_PROFILE_SPECIFIER="$PROFILE_UUID" \
          CODE_SIGN_IDENTITY="Apple Distribution"

    - name: Export IPA
      run: |
        cat > $RUNNER_TEMP/ExportOptions.plist << 'PLIST'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
          <key>method</key>
          <string>app-store</string>
          <key>teamID</key>
          <string>358L7UXVJ4</string>
          <key>signingStyle</key>
          <string>manual</string>
          <key>uploadSymbols</key>
          <true/>
          <key>provisioningProfiles</key>
          <dict>
            <key>no.synth.where</key>
            <string>${PROFILE_UUID}</string>
          </dict>
        </dict>
        </plist>
        PLIST

        xcodebuild -exportArchive \
          -archivePath $RUNNER_TEMP/Where.xcarchive \
          -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
          -exportPath $RUNNER_TEMP/export

    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.3'
        bundler-cache: true
        working-directory: fastlane

    - name: Upload to App Store Connect
      env:
        ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
        IPA_PATH: ${{ runner.temp }}/export/Where.ipa
      run: bundle exec --gemfile=fastlane/Gemfile fastlane ios deploy

    - name: Create version tag
      run: |
        VERSION_TAG="${{ steps.version.outputs.tag }}"
        echo "Tagging $VERSION_TAG"
        git tag "$VERSION_TAG" || echo "Tag $VERSION_TAG already exists"
        git push origin "$VERSION_TAG" || echo "Tag $VERSION_TAG already pushed"

    - name: Clean up keychain
      if: always()
      run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
