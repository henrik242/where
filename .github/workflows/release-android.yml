name: Release Android

permissions:
  contents: write

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v5

    - name: Create local.properties
      run: |
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        echo "TRACKING_HINT=${{ secrets.TRACKING_HINT }}" >> local.properties

    - name: Create google-services.json
      run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > app/google-services.json

    - name: Decode signing keystore
      run: echo "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" | base64 -d > /tmp/release.jks

    - name: Build release AAB
      env:
        SIGNING_STORE_FILE: /tmp/release.jks
        SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
        SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
        SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
      run: ./gradlew bundleRelease --stacktrace

    - name: Run tests
      run: ./gradlew testDebugUnitTest --stacktrace

    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.3'
        bundler-cache: true
        working-directory: fastlane

    - name: Decode Play Store service account key
      run: echo "${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}" | base64 -d > /tmp/play-service-account.json

    - name: Upload to Play Store
      env:
        GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_PATH: /tmp/play-service-account.json
      run: bundle exec --gemfile=fastlane/Gemfile fastlane android deploy

    - name: Create version tag
      run: |
        VERSION_TAG="v$(git rev-list --count HEAD)"
        echo "Tagging $VERSION_TAG"
        git tag "$VERSION_TAG" || echo "Tag $VERSION_TAG already exists"
        git push origin "$VERSION_TAG" || echo "Tag $VERSION_TAG already pushed"
